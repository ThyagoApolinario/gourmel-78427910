    <text x="499" y="472" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">📊 Relatórios</text>
    <text x="499" y="516" fill="#14532D" font-family="Segoe UI, Arial, sans-serif" font-size="22">Relatório mensal, métodos, custos</text>
