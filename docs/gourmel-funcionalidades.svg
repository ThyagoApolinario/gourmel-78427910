    <text x="886" y="472" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">📈 Dashboard</text>
    <text x="886" y="516" fill="#1E3A8A" font-family="Segoe UI, Arial, sans-serif" font-size="22">Visão consolidada para apoiar</text>
    <text x="886" y="550" fill="#1E3A8A" font-family="Segoe UI, Arial, sans-serif" font-size="22">decisões do negócio.</text>
  </g>

  <text x="78" y="678" fill="#78350F" font-family="Segoe UI, Arial, sans-serif" font-size="24">Também inclui perfil, ajuda, configurações e autenticação integrada via Supabase.</text>
