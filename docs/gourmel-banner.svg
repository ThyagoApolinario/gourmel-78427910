<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF5E8"/>
      <stop offset="1" stop-color="#FFE1B8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFF7ED" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#A16207" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="180" fill="#FDBA74" fill-opacity="0.28"/>
  <circle cx="180" cy="560" r="220" fill="#FB923C" fill-opacity="0.14"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="1136" height="496" rx="28" fill="url(#card)"/>
  </g>

  <text x="120" y="190" fill="#7C2D12" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    Gourmel Pet
  </text>
  <text x="120" y="275" fill="#431407" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800">
    Confeitaria Canina Natural
  </text>
  <text x="120" y="338" fill="#78350F" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
    Sistema web para organizar insumos, receitas, kits, vendas,
  </text>
  <text x="120" y="378" fill="#78350F" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">
    custos, relatórios e a operação diária do negócio.
  </text>

  <g>
    <rect x="120" y="430" width="170" height="52" rx="26" fill="#7C3AED" fill-opacity="0.1"/>
    <text x="156" y="463" fill="#6D28D9" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Lovable</text>

    <rect x="308" y="430" width="140" height="52" rx="26" fill="#2563EB" fill-opacity="0.1"/>
    <text x="350" y="463" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">React</text>

    <rect x="466" y="430" width="120" height="52" rx="26" fill="#0EA5E9" fill-opacity="0.12"/>
    <text x="501" y="463" fill="#0369A1" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Vite</text>

    <rect x="604" y="430" width="190" height="52" rx="26" fill="#14B8A6" fill-opacity="0.12"/>
    <text x="637" y="463" fill="#0F766E" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Supabase</text>
  </g>

  <g>
    <rect x="880" y="156" width="240" height="120" rx="24" fill="#FFFFFF"/>
    <text x="915" y="205" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Insumos</text>
    <text x="915" y="240" fill="#7C2D12" font-family="Segoe UI, Arial, sans-serif" font-size="22">controle de estoque</text>

    <rect x="1010" y="300" width="170" height="120" rx="24" fill="#FFFFFF"/>
    <text x="1042" y="349" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Vendas</text>
    <text x="1042" y="384" fill="#7C2D12" font-family="Segoe UI, Arial, sans-serif" font-size="22">registro diário</text>

    <rect x="820" y="332" width="160" height="120" rx="24" fill="#FFFFFF"/>
    <text x="852" y="381" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Kits</text>
    <text x="852" y="416" fill="#7C2D12" font-family="Segoe UI, Arial, sans-serif" font-size="22">combinações</text>
  </g>
</svg>